# Railway service config for apps/web.
# Point the Railway service at the repo root and select this config via:
#   Settings → Service → Config-as-Code Path = apps/web/railway.toml

[build]
builder = "RAILPACK"
# VITE_API_ORIGIN is a build-time env, so it must be set on the Railway service.
buildCommand = "bun install --frozen-lockfile && cd apps/web && bun run build"

[deploy]
startCommand = "cd apps/web && bun run start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
