# Railway service config for apps/api.
# Point the Railway service at the repo root and select this config via:
#   Settings → Service → Config-as-Code Path = apps/api/railway.toml

[build]
builder = "NIXPACKS"
# Run the db package's `generate` script — it uses the workspace-pinned Prisma 6
# via bun's resolver. (`bunx prisma` fetches Prisma 7, which breaks on the
# `url = env()` datasource syntax; the raw node_modules/.bin path isn't reliably
# resolvable in the build container.)
buildCommand = "bun install --frozen-lockfile && cd packages/db && bun run generate"

[deploy]
# Migrate on boot, then start the API from the repo root. Plain `cd` chain — no
# subshell/parens, which Railway's start-command parser rejects.
startCommand = "cd packages/db && bun run migrate:deploy && cd /app && bun run apps/api/src/index.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
