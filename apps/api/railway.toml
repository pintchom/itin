# Railway service config for apps/api.
# Point the Railway service at the repo root and select this config via:
#   Settings → Service → Config-as-Code Path = apps/api/railway.toml

[build]
builder = "NIXPACKS"
# Build context is the repo root. Generate the Prisma client during build so it's baked in.
buildCommand = "bun install --frozen-lockfile && bunx prisma generate --schema=packages/db/prisma/schema.prisma"

[deploy]
# Run pending migrations on boot, then start the API. Bun runs TS directly.
startCommand = "bunx prisma migrate deploy --schema=packages/db/prisma/schema.prisma && bun run apps/api/src/index.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
