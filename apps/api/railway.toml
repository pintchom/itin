# Railway service config for apps/api.
# Point the Railway service at the repo root and select this config via:
#   Settings → Service → Config-as-Code Path = apps/api/railway.toml

[build]
builder = "NIXPACKS"
# Build context is the repo root. Call the workspace-pinned Prisma 6 binary
# directly (hoisted to node_modules/.bin) — `bunx prisma` fetches Prisma 7
# (latest), which breaks on the `url = env()` datasource syntax.
buildCommand = "bun install --frozen-lockfile && node_modules/.bin/prisma generate --schema=packages/db/prisma/schema"

[deploy]
# Run pending migrations on boot, then start the API. No subshell/parens —
# Railway's start-command parser rejects them.
startCommand = "node_modules/.bin/prisma migrate deploy --schema=packages/db/prisma/schema && bun run apps/api/src/index.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
