# Railway service config for apps/api.
# Point the Railway service at the repo root and select this config via:
#   Settings → Service → Config-as-Code Path = apps/api/railway.toml

[build]
builder = "NIXPACKS"
# Build context is the repo root. Use the workspace-pinned Prisma 6 (via the db
# package script) instead of `bunx prisma`, which fetches Prisma 7 (latest) and
# breaks on the `url = env()` datasource syntax.
buildCommand = "bun install --frozen-lockfile && (cd packages/db && bun run generate)"

[deploy]
# Run pending migrations on boot (local Prisma 6), then start the API from root.
startCommand = "(cd packages/db && bun run migrate:deploy) && bun run apps/api/src/index.ts"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
